openapi: 3.0.3
info:
  title: Analog Wakatime Lite Core API
  version: v1.0.0
  description: OpenAPI specification for the currently registered backend routes.

tags:
  - name: system
  - name: docs

paths:
  /api/v1/:
    get:
      tags: [system]
      operationId: getApiStatus
      summary: Check API status
      responses:
        '200':
          description: API health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/docs:
    get:
      tags: [docs]
      operationId: getSwaggerIndex
      summary: Serve Swagger UI entrypoint
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/DocsResponse'

  /api/v1/docs/:
    get:
      tags: [docs]
      operationId: getSwaggerIndexWithSlash
      summary: Serve Swagger UI entrypoint with trailing slash
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/DocsResponse'

  /api/v1/docs/openapi.yaml:
    get:
      tags: [docs]
      operationId: getOpenApiDocument
      summary: Download the OpenAPI specification file
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                $ref: '#/components/schemas/DocsResponse'
            text/yaml:
              schema:
                $ref: '#/components/schemas/DocsResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"

    DocsResponse:
      type: string
      properties: 
        content:
          type: string
          example: "Swagger UI HTML content or OpenAPI YAML content"