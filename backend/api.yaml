openapi: 3.0.3
info:
  title: Analog Wakatime Lite Core API
  version: v1.0.0
  description: OpenAPI specification for the currently registered backend routes.

tags:
  - name: system
  - name: auth
  - name: profile
  - name: docs

paths:
  /api/v1/:
    get:
      tags: [system]
      operationId: getApiStatus
      summary: Check API status
      responses:
        '200':
          description: API health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/register:
    post:
      tags: [auth]
      operationId: registerUser
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "test@example.com"
                username:
                  type: string
                  example: "newuser"
                password:
                  type: string
                  example: "securepassword"
      responses:
        '200':
          description: User registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User registered successfully"
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Username and password are required"
        '500':
          description: Server error during registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to create user"

  /api/v1/login:
    post:
      tags: [auth]
      operationId: loginUser
      summary: Authenticate a user and return a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "existinguser"
                password:
                  type: string
                  example: "securepassword"
      responses:
        '200':
          description: User login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Username and password are required"
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid username or password"
        '500':
          description: Server error during authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to authenticate user"

  
  
  /api/v1/docs:
    get:
      tags: [docs]
      operationId: getSwaggerIndex
      summary: Serve Swagger UI entrypoint
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/DocsResponse'

  /api/v1/docs/:
    get:
      tags: [docs]
      operationId: getSwaggerIndexWithSlash
      summary: Serve Swagger UI entrypoint with trailing slash
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/DocsResponse'

  /api/v1/docs/openapi.yaml:
    get:
      tags: [docs]
      operationId: getOpenApiDocument
      summary: Download the OpenAPI specification file
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                $ref: '#/components/schemas/DocsResponse'
            text/yaml:
              schema:
                $ref: '#/components/schemas/DocsResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"

    DocsResponse:
      type: string
      properties: 
        content:
          type: string
          example: "Swagger UI HTML content or OpenAPI YAML content"